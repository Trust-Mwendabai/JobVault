<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Browse Jobs — JobVault Zambia</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
#jobs-section{background:var(--deep);min-height:60vh;}
.search-bar{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.search-bar input{flex:1;min-width:180px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:.75rem 1rem;border-radius:var(--radius);font-family:var(--sans);font-size:.9rem;outline:none;transition:border-color .2s;}
.search-bar input:focus{border-color:var(--teal);}
.search-bar input::placeholder{color:var(--muted);}
.search-bar .btn-primary{padding:.75rem 1.5rem;}
.results-meta{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem;}
.results-meta strong{color:var(--text);}
.load-more-wrap{text-align:center;margin-top:2.5rem;}
</style>
</head>
<body>
<div id="nav-placeholder"></div>

<div class="page-header">
  <div class="page-header-inner">
    <div class="section-tag">Browse Listings</div>
    <h1>Find Your Next <em>Opportunity</em></h1>
    <p>Filter by job type, industry, and location to discover the right role for you.</p>
  </div>
</div>

<section id="jobs-section">
  <div class="search-bar">
    <input id="kw-input" type="text" placeholder="Job title, skill, or keyword…"/>
    <input id="loc-input" type="text" placeholder="City or Remote"/>
    <button class="btn-primary" onclick="applySearch()">Search</button>
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="remote">Remote</button>
    <button class="filter-btn" data-filter="onsite">On-site</button>
    <button class="filter-btn" data-filter="hybrid">Hybrid</button>
    <button class="filter-btn" data-filter="fulltime">Full-time</button>
    <button class="filter-btn" data-filter="parttime">Part-time</button>
    <button class="filter-btn" data-filter="contract">Contract</button>
    <div class="select-wrap">
      <select class="filter-select" id="industryFilter" onchange="applyFilters()">
        <option value="all">All Industries</option>
        <option value="tech">Technology</option>
        <option value="finance">Finance</option>
        <option value="health">Healthcare</option>
        <option value="design">Design</option>
        <option value="marketing">Marketing</option>
        <option value="hr">Human Resources</option>
      </select>
      <span style="position:absolute;right:.85rem;pointer-events:none;color:var(--muted);display:flex;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </span>
    </div>
  </div>
  <div class="results-meta" id="resultsMeta"></div>
  <div class="jobs-grid" id="jobsGrid"></div>
  <div class="load-more-wrap"><button class="btn-outline" id="loadMoreBtn" onclick="loadMore()">Load More Listings</button></div>
</section>

<footer id="site-footer"></footer>
<div id="modal-placeholder"></div>
<div id="toast-placeholder"></div>

<script src="js/shared.js"></script>
<script>
let activeFilter='all', activeIndustry='all', activeKw='', activeLoc='', visibleCount=9;

function applyFilters(){activeIndustry=document.getElementById('industryFilter').value;visibleCount=9;render();}
function applySearch(){activeKw=document.getElementById('kw-input').value.trim().toLowerCase();activeLoc=document.getElementById('loc-input').value.trim().toLowerCase();visibleCount=9;render();}
function loadMore(){visibleCount+=6;render();}

document.getElementById('filterBar').addEventListener('click',e=>{
  if(!e.target.classList.contains('filter-btn'))return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter=e.target.dataset.filter;
  visibleCount=9; render();
});
document.getElementById('kw-input').addEventListener('keydown',e=>{if(e.key==='Enter')applySearch();});

function render(){
  let list=JOBS.filter(j=>{
    const tm=activeFilter==='all'||j.type===activeFilter||j.contract.toLowerCase().replace(/[^a-z]/g,'')===activeFilter.replace(/[^a-z]/g,'');
    const im=activeIndustry==='all'||j.industry===activeIndustry;
    const km=!activeKw||(j.title+j.company+j.industry).toLowerCase().includes(activeKw);
    const lm=!activeLoc||j.location.toLowerCase().includes(activeLoc);
    return tm&&im&&km&&lm;
  });
  document.getElementById('resultsMeta').innerHTML=`Showing <strong>${Math.min(visibleCount,list.length)}</strong> of <strong>${list.length}</strong> listings`;
  document.getElementById('jobsGrid').innerHTML=list.length?list.slice(0,visibleCount).map(j=>jobCardHTML(j)).join(''):`<p style="color:var(--muted);padding:3rem 0;grid-column:1/-1;text-align:center">No listings match your filters. Try adjusting your search.</p>`;
  document.getElementById('loadMoreBtn').style.display=visibleCount>=list.length?'none':'inline-flex';
}

// Read URL params
const params=new URLSearchParams(window.location.search);
if(params.get('q')){activeKw=params.get('q').toLowerCase();document.getElementById('kw-input').value=params.get('q');}
if(params.get('loc')){activeLoc=params.get('loc').toLowerCase();document.getElementById('loc-input').value=params.get('loc');}

renderNav('Browse Jobs');
renderFooter();
renderModal();
renderToast();
initNav();
render();
</script>
</body>
</html>
